workflows:
  default-workflow:
    name: Default Workflow
    max_build_duration: 60
    environment:
      flutter: stable
      vars:
        PACKAGE_NAME: "com.sherko.app"
    scripts:
      - name: Fix and Build
        script: |
          flutter create . --platforms=android,ios --org com.sherko
          flutter build apk --release
    artifacts:
      - build/flutter-assets/*.apk
      - build/app/outputs/flutter-apk/*.apk
      
